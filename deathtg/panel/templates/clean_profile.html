<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeathTG - Profile & Matrix</title>
    <link rel="stylesheet" href="/static/clean.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Consolas', monospace; margin: 0; overflow-x: hidden; }
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }
        
        /* Кнопка меню слева сверху */
        .nav-toggle { position: fixed; top: 20px; left: 20px; z-index: 1000; background: rgba(0, 240, 255, 0.1); border: 1px solid #00f0ff; color: #00f0ff; padding: 10px; border-radius: 5px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 12px; }
        .nav-toggle:hover { background: #00f0ff; color: #000; }

        .container { max-width: 700px; margin: 60px auto; padding: 30px; background: rgba(10, 10, 12, 0.85); border-radius: 12px; border: 1px solid #1a1a1a; backdrop-filter: blur(10px); }
        
        /* Аватар с кроппером */
        .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .avatar-box { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00f0ff; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-box:hover::after { content: "EDIT"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; color: #00f0ff; font-weight: bold; }

        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #222; }
        .tab-btn { background: none; border: none; color: #555; padding: 10px 20px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .tab-btn.active { color: #00f0ff; border-bottom: 2px solid #00f0ff; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #00f0ff; font-size: 11px; margin-bottom: 8px; text-transform: uppercase; }
        .form-control { width: 100%; background: #050505; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 5px; box-sizing: border-box; }
        .form-control:focus { border-color: #00f0ff; outline: none; }

        .btn-action { background: #00f0ff; color: #000; border: none; padding: 15px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Модалка Кроппера */
        .crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .crop-container { background: #111; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; border: 1px solid #00f0ff; }
        .crop-wrap { width: 100%; height: 350px; background: #000; margin-bottom: 20px; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    
    <button class="nav-toggle" onclick="window.location.href='/'">Меню</button>

    <div class="container">
        <div class="avatar-section">
            <div class="avatar-box" onclick="document.getElementById('ava-input').click()">
                <img src="{{ profile.avatar or '/static/user/avatar.png' }}" id="current-ava">
            </div>
            <h2 style="margin-top: 15px;">{{ profile.profile_title or 'Operator' }}</h2>
            <p style="color: #666; font-size: 12px;">@{{ profile.username or 'unknown' }}</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('main-set')">Настройки</button>
            <button class="tab-btn" onclick="showTab('sys-set')">Система</button>
        </div>

        <form action="/profile/save" method="POST">
            <div id="main-set" class="tab-page">
                <div class="form-group">
                    <label>Заголовок профиля</label>
                    <input type="text" name="profile_title" class="form-control" value="{{ profile.profile_title }}">
                </div>
                <div class="form-group">
                    <label>Описание (.info)</label>
                    <textarea name="description" class="form-control" rows="3">{{ profile.description }}</textarea>
                </div>
            </div>

            <div id="sys-set" class="tab-page" style="display:none;">
                <div class="form-group">
                    <label>Префикс команд</label>
                    <input type="text" name="command_prefix" class="form-control" value="{{ status.prefix }}">
                </div>
                <div class="form-group">
                    <label>Цвет акцента</label>
                    <select name="accent" class="form-control">
                        <option value="blue" {% if profile.accent == 'blue' %}selected{% endif %}>Cyan Neon</option>
                        <option value="red" {% if profile.accent == 'red' %}selected{% endif %}>Deadly Red</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-action">Сохранить изменения</button>
        </form>
    </div>

    <input type="file" id="ava-input" style="display:none" accept="image/*">
    <div class="crop-modal" id="crop-modal">
        <div class="crop-container">
            <div class="crop-wrap"><img id="crop-target"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn-action" style="background:#222; color:#fff;" onclick="closeCrop()">Отмена</button>
                <button class="btn-action" onclick="applyCrop()">Готово</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "DEATHTG01XYZ#@";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f0ff';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // Tabs
        function showTab(id) {
            document.querySelectorAll('.tab-page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
        }

        // Cropper
        let cropper;
        const avaInput = document.getElementById('ava-input');
        const cropTarget = document.getElementById('crop-target');
        const cropModal = document.getElementById('crop-modal');

        avaInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                cropTarget.src = reader.result;
                cropModal.style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(cropTarget, { aspectRatio: 1, viewMode: 1 });
            };
            reader.readAsDataURL(file);
        };

        function closeCrop() { cropModal.style.display = 'none'; }
        
        async function applyCrop() {
            const base64 = cropper.getCroppedCanvas({ width: 256, height: 256 }).toDataURL();
            const res = await fetch('/profile/avatar', {
                method: 'POST',
                body: new URLSearchParams({ avatar_base64: base64 })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                document.getElementById('current-ava').src = data.avatar;
                closeCrop();
            }
        }
    </script>
</body>
</html>

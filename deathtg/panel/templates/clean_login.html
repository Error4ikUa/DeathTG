<!doctype html>
<html lang="{{ lang or 'en' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ tr('login.title') }}</title>
    <link rel="stylesheet" href="/static/clean.css">
</head>
<body>
<canvas id="matrix"></canvas>
<main class="auth">
    <section class="card auth-card">
        <div class="mark big">DTG</div>
        <h1>{{ tr('login.heading') }}</h1>
        <p>{{ tr('login.intro') }}</p>
        {% if error %}<div class="toast bad">{{ error }}</div>{% endif %}
        <form method="post" action="/login" class="stack">
            <label>{{ tr('login.password_label') }}</label>
            <input type="text" name="key" placeholder="{{ tr('login.password_placeholder') }}" required autofocus>
            <button type="submit">{{ tr('login.submit') }}</button>
        </form>
        <small>{{ tr('login.note') }}</small>
    </section>
</main>
<script src="/static/matrix.js"></script>
</body>
</html>

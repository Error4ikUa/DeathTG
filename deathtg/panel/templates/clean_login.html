<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeathTG Login</title>
    <link rel="stylesheet" href="/static/clean.css">
</head>
<body>
<canvas id="matrix"></canvas>
<main class="auth">
    <section class="card auth-card">
        <div class="mark big">DTG</div>
        <h1>DeathTG Control</h1>
        <p>Sign in to the local control panel.</p>
        {% if error %}<div class="toast bad">{{ error }}</div>{% endif %}
        <form method="post" action="/login" class="stack">
            <label>Panel password</label>
            <input type="text" name="key" placeholder="Password set during setup" required autofocus>
            <button type="submit">Enter</button>
        </form>
        <small>This is the panel password, not your Telegram password.</small>
    </section>
</main>
<script src="/static/matrix.js"></script>
</body>
</html>
